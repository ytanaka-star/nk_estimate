<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NK 見積入力システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f2ed; --surface:#fff; --surface2:#faf9f6;
  --border:#d6d1c7; --border-strong:#a89f8f;
  --ink:#1a1814; --ink2:#5a5650; --ink3:#8a857e;
  --accent:#1a3a5c; --accent2:#2a5a8c; --accent-light:#e8eef5;
  --danger:#8c2a2a; --danger-light:#f5e8e8;
  --success:#2a5c3a;
  --gold:#8c6a1a; --gold-light:#f5efd8;
  --teal:#1a5c4a; --teal-light:#e8f5f0;
  --radius:4px;
  --shadow:0 2px 12px rgba(26,24,20,.08);
  --shadow-lg:0 8px 32px rgba(26,24,20,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ── */
header{background:var(--accent);color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-brand{display:flex;align-items:center;gap:12px}
.brand-badge{background:#fff;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;padding:2px 10px;border-radius:2px;letter-spacing:2px}
.brand-title{font-size:13px;font-weight:300;letter-spacing:3px;opacity:.9}
.header-nav{display:flex;gap:4px}
.nav-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 16px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.1)}
.nav-btn.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.6)}

/* ── LAYOUT ── */
.app{display:flex;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--ink3);text-transform:uppercase}
.new-btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:6px;transition:background .15s}
.new-btn:hover{background:var(--accent2)}
.search-box{padding:10px 16px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--surface2);color:var(--ink);outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent2)}
.estimate-list{flex:1;overflow-y:auto}
.estimate-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.estimate-item:hover{background:var(--surface2)}
.estimate-item.selected{background:var(--accent-light);border-left:3px solid var(--accent)}
.estimate-item.selected .ei-num{color:var(--accent)}
.ei-num{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ei-name{font-size:13px;font-weight:500;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-meta{font-size:11px;color:var(--ink3);display:flex;justify-content:space-between;align-items:center}
.ei-total{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--accent)}
.ei-ver{display:inline-block;background:var(--gold-light);color:var(--gold);border:1px solid #d4b87a;border-radius:3px;font-size:10px;font-weight:700;padding:1px 5px;font-family:'IBM Plex Mono',monospace}
.ei-to{display:inline-block;background:var(--teal-light);color:var(--teal);border:1px solid #8abfb0;border-radius:3px;font-size:10px;font-weight:700;padding:1px 5px}
.empty-list{padding:40px 16px;text-align:center;color:var(--ink3);font-size:13px}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:32px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);max-width:940px;margin:0 auto}

/* ── FORM HEADER ── */
.form-header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:6px 6px 0 0;flex-wrap:wrap;gap:12px}
.form-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--ink3);text-transform:uppercase}
.form-id{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--accent);letter-spacing:2px}

/* ── TOP FIELDS ── */
.fields-band{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.fields-grid{display:grid;grid-template-columns:160px 1fr 140px 100px;gap:14px}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase}
.field-input{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.field-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(42,90,140,.08)}
.field-input.id-input{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;letter-spacing:2px;color:var(--accent)}
.field-input.id-input.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(140,42,42,.10)}
.field-hint{font-size:11px;color:var(--ink3);margin-top:2px}
.field-hint.error-hint{color:var(--danger)}
/* addressee row */
.to-row{display:flex;align-items:center;gap:8px}
.to-row select{flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
.to-row select:focus{border-color:var(--accent2)}
.to-edit-btn{padding:7px 10px;border:1px solid var(--border-strong);background:transparent;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--ink2);transition:all .12s;white-space:nowrap}
.to-edit-btn:hover{background:var(--surface2);border-color:var(--ink2)}

/* ── VERSION BAR ── */
.ver-bar{display:flex;align-items:center;gap:8px;padding:10px 28px;background:var(--gold-light);border-bottom:1px solid #d4b87a;flex-wrap:wrap}
.ver-bar-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.ver-chips{display:flex;gap:4px;flex-wrap:wrap}
.ver-chip{padding:3px 12px;border-radius:20px;border:1px solid #d4b87a;background:#fff;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.ver-chip:hover{background:#ffe8a0}
.ver-chip.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.new-ver-btn{margin-left:auto;display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all .12s;white-space:nowrap}
.new-ver-btn:hover{background:var(--gold);color:#fff}
.readonly-badge{margin-left:auto;font-size:11px;color:var(--gold);background:#fff3cc;padding:3px 10px;border-radius:4px;border:1px solid #d4b87a;white-space:nowrap}

/* ── FORM BODY ── */
.form-body{padding:24px 28px}

/* ── PATTERN BLOCK ── */
.pattern-block{border:1px solid var(--border);border-radius:6px;margin-bottom:20px;overflow:hidden}
.pattern-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.pattern-label-input{flex:1;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:var(--ink);outline:none;padding:2px 6px;border-radius:var(--radius);transition:background .12s}
.pattern-label-input:hover{background:#ebebeb}
.pattern-label-input:focus{background:#fff;box-shadow:0 0 0 2px var(--accent2)}
.pattern-del-btn{padding:4px 10px;border:1px solid #c8a0a0;background:transparent;color:var(--danger);border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all .12s;white-space:nowrap}
.pattern-del-btn:hover{background:var(--danger-light)}
.pattern-body{padding:12px 16px}

/* ── ITEMS TABLE ── */
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.items-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.items-table th{background:var(--accent);color:#fff;padding:8px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:left;white-space:nowrap}
.items-table th:first-child{border-radius:3px 0 0 0}
.items-table th:last-child{border-radius:0 3px 0 0}
.items-table td{padding:3px 3px;border-bottom:1px solid var(--border);vertical-align:middle}
.items-table tr:hover td{background:var(--surface2)}
.items-table td input,.items-table td select{width:100%;padding:6px 7px;border:1px solid transparent;border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);background:transparent;outline:none;transition:border-color .1s,background .1s}
.items-table td input:focus,.items-table td select:focus{border-color:var(--accent2);background:#fff;box-shadow:0 0 0 2px rgba(42,90,140,.08)}
.items-table td input.num-input{font-family:'IBM Plex Mono',monospace;text-align:right}
.total-cell{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;text-align:right;padding:6px 7px;color:var(--accent)}
.del-btn{width:26px;height:26px;border:none;background:transparent;color:var(--ink3);cursor:pointer;border-radius:var(--radius);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .1s;margin:0 auto}
.del-btn:hover{background:var(--danger-light);color:var(--danger)}
.col-no{width:36px;text-align:center}
.col-name{min-width:180px}
.col-qty{width:76px}
.col-unit{width:76px}
.col-price{width:106px}
.col-total{width:116px}
.col-del{width:34px}
.add-row-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border-strong);color:var(--ink2);padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;transition:all .15s;margin-top:4px}
.add-row-btn:hover{border-color:var(--accent2);color:var(--accent);background:var(--accent-light)}

/* pattern subtotal */
.pattern-subtotal{display:flex;justify-content:flex-end;padding:8px 0 4px}
.pattern-subtotal-box{background:var(--accent-light);border:1px solid #b0c8e0;border-radius:var(--radius);padding:6px 16px;display:flex;align-items:center;gap:16px;font-size:13px}
.pattern-subtotal-label{color:var(--accent2);font-weight:700}
.pattern-subtotal-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--accent);font-size:14px}

/* add pattern */
.add-pattern-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border-strong);color:var(--ink2);padding:8px 20px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .15s;width:100%;margin-bottom:20px}
.add-pattern-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}

/* ── BOTTOM ── */
.bottom-grid{display:grid;grid-template-columns:1fr 280px;gap:20px;margin-top:4px}
.remarks-area label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;margin-bottom:6px}
.remarks-area textarea{width:100%;height:90px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);resize:vertical;outline:none;transition:border-color .15s}
.remarks-area textarea:focus{border-color:var(--accent2)}
.totals-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.totals-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border)}
.totals-row:last-child{border-bottom:none}
.totals-label{font-size:12px;color:var(--ink2)}
.totals-value{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--ink)}
.totals-row.grand{background:var(--accent)}
.totals-row.grand .totals-label{color:rgba(255,255,255,.8);font-weight:700}
.totals-row.grand .totals-value{color:#fff;font-size:18px}

/* ── ACTIONS ── */
.form-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface2);border-radius:0 0 6px 6px;flex-wrap:wrap}
.btn{padding:9px 22px;border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;display:flex;align-items:center;gap:6px}
.btn-outline{background:transparent;border-color:var(--border-strong);color:var(--ink2)}
.btn-outline:hover{border-color:var(--ink2);color:var(--ink);background:var(--surface2)}
.btn-danger{background:transparent;border-color:#c8a0a0;color:var(--danger)}
.btn-danger:hover{background:var(--danger-light)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;color:var(--ink3);text-align:center;gap:12px}
.empty-state-icon{font-size:48px;opacity:.4}
.empty-state h3{font-size:16px;color:var(--ink2);font-weight:500}
.empty-state p{font-size:13px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:6px;padding:28px;max-width:440px;width:90%;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal h3{font-size:16px;margin-bottom:10px}
.modal p{font-size:13px;color:var(--ink2);margin-bottom:16px;line-height:1.7}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* addressee manager */
.to-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:240px;overflow-y:auto}
.to-list-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2)}
.to-list-item input{flex:1;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);outline:none}
.to-list-item .to-rm-btn{width:24px;height:24px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);flex-shrink:0}
.to-list-item .to-rm-btn:hover{background:var(--danger-light);color:var(--danger)}
.to-add-row{display:flex;gap:8px}
.to-add-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.to-add-input:focus{border-color:var(--accent2)}
.to-add-confirm{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif;transition:background .15s}
.to-add-confirm:hover{background:var(--accent2)}

.row-num{text-align:center;font-size:12px;color:var(--ink3);font-family:'IBM Plex Mono',monospace}

/* ── DB SEARCH ── */
.db-search-bar{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.db-search-wrap{flex:1;min-width:200px;position:relative}
.db-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.db-search-input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.db-search-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(42,90,140,.08)}
.db-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:3px;display:none}
.db-search-clear:hover{color:var(--ink);background:var(--surface2)}
.db-search-clear.visible{display:block}
.db-search-meta{font-size:12px;color:var(--ink3);white-space:nowrap}
.db-search-meta strong{color:var(--accent);font-family:'IBM Plex Mono',monospace}
.db-filter-chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 28px;border-bottom:1px solid var(--border);background:var(--surface2)}
.filter-chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--ink2);font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:.5px}
.filter-chip:hover{border-color:var(--accent2);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip-label{font-size:10px;color:var(--ink3);display:flex;align-items:center;padding-top:4px}

/* highlight */
mark{background:#fff176;color:var(--ink);border-radius:2px;padding:0 1px}

/* db table */
.db-table-wrap{padding:20px 28px;overflow-x:auto}
.db-table{width:100%;border-collapse:collapse}
.db-table th{background:var(--accent);color:#fff;padding:9px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
.db-table th:hover{background:var(--accent2)}
.db-table th .sort-arrow{margin-left:4px;opacity:.5;font-size:10px}
.db-table th.sorted .sort-arrow{opacity:1}
.db-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.db-table tr:hover td{background:var(--surface2);cursor:pointer}
.db-table tr.match-row td{background:#fffde7}
.db-table tr.match-row:hover td{background:#fff9c4}
.db-no-results{padding:40px;text-align:center;color:var(--ink3);font-size:13px}
.db-match-detail{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.5}
.db-match-detail mark{font-size:11px}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="brand-badge">NK</span>
    <span class="brand-title">見積入力システム</span>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showView('form',event)">見積入力</button>
    <button class="nav-btn" onclick="showView('db',event)">データ一覧</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">保存済み見積</span>
      <button class="new-btn" onclick="newEstimate()">＋ 新規</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="番号・現場名で検索..." oninput="renderList()">
    </div>
    <div class="estimate-list" id="estimateList"></div>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <h3>見積を選択または新規作成</h3>
      <p>左のサイドバーから見積を選ぶか、「新規」ボタンで作成してください。</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑 見積の削除</h3>
    <p id="deleteModalMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('deleteModal')">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- NEW VERSION MODAL -->
<div class="modal-overlay" id="newVerModal">
  <div class="modal">
    <h3>📄 新しい版を作成</h3>
    <p id="newVerModalMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('newVerModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmNewVersion()">新版を作成</button>
    </div>
  </div>
</div>

<!-- PRINT MODAL -->
<div class="modal-overlay" id="printModal">
  <div class="modal" style="max-width:480px">
    <h3>🖨 印刷 / PDF出力</h3>
    <p>印刷ダイアログが開きます。PDFとして保存する場合はプリンター欄で <strong>「PDFに保存」</strong> を選択してください。推奨ファイル名：</p>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:4px">
      <div style="font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:1px;margin-bottom:4px">推奨ファイル名</div>
      <div id="pdfFilename" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);word-break:break-all"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('printModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="executePrint()">印刷を開始</button>
    </div>
  </div>
</div>

<!-- ADDRESSEE MANAGER MODAL -->
<div class="modal-overlay" id="toModal">
  <div class="modal" style="max-width:400px">
    <h3>🏢 宛先リストの管理</h3>
    <p>宛先を追加・編集・削除できます。名称を直接クリックして編集してください。</p>
    <div class="to-list" id="toList"></div>
    <div class="to-add-row">
      <input class="to-add-input" id="toAddInput" placeholder="新しい宛先を入力" maxlength="40"
        onkeydown="if(event.key==='Enter')addAddressee()">
      <button class="to-add-confirm" onclick="addAddressee()">追加</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveAddressees()">完了</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   GLOBAL STATE
══════════════════════════════════════ */
let estimates   = JSON.parse(localStorage.getItem('nk_estimates_v3') || '[]');
let addressees  = JSON.parse(localStorage.getItem('nk_addressees') || '["SK","AO"]');
let currentId   = null;
let currentVer  = null;
let deleteTargetId = null;
const TAX_RATE  = 0.10;
const UNIT_OPTIONS = ['式','個','枚','本','m','m²','kg','台','セット','箱','冊'];

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n)   { return (n===''||n===null||n===undefined||isNaN(+n)) ? '—' : (+n).toLocaleString('ja-JP'); }
function fmtY(n)  { return isNaN(n) ? '¥ —' : '¥ ' + (+n).toLocaleString('ja-JP'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function saveAll(){ localStorage.setItem('nk_estimates_v3', JSON.stringify(estimates)); }
function saveAddr(){ localStorage.setItem('nk_addressees', JSON.stringify(addressees)); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function blankItem()   { return {name:'',qty:'',unit:'式',price:''}; }
function blankPattern(label){ return {label, items:[blankItem()]}; }
function blankVersion(label){
  return { verLabel:label, patterns:[blankPattern('パターン1')], remarks:'', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
}
function getEst()    { return estimates.find(e=>e._id===currentId); }
function activeVer() { const e=getEst(); return e?e.versions[currentVer]:null; }

function calcPatternSub(pat){
  return (pat.items||[]).reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
}
function calcVersionTotals(ver){
  const sub = (ver.patterns||[]).reduce((s,p)=>s+calcPatternSub(p),0);
  const tax  = Math.round(sub*TAX_RATE);
  return {subtotal:sub, tax, grand:sub+tax};
}

/* ══════════════════════════════════════
   VALIDATION
══════════════════════════════════════ */
function validateSiteId(val,selfId){
  if(!val)          return {ok:false,msg:'現場ナンバーを入力してください'};
  if(!/^\d{6}$/.test(val)) return {ok:false,msg:'6桁の数字で入力してください'};
  const dup = estimates.find(e=>e.siteId===val&&e._id!==selfId);
  if(dup)           return {ok:false,msg:`No.${val}（${dup.name||'現場名未入力'}）と重複しています`};
  return {ok:true,msg:''};
}

/* ══════════════════════════════════════
   ADDRESSEE MANAGER
══════════════════════════════════════ */
function openAddresseeModal(){
  renderToList();
  document.getElementById('toAddInput').value='';
  openModal('toModal');
}
function renderToList(){
  document.getElementById('toList').innerHTML = addressees.map((a,i)=>`
    <div class="to-list-item">
      <input type="text" value="${a}" onchange="addressees[${i}]=this.value" maxlength="40">
      <button class="to-rm-btn" onclick="removeAddressee(${i})" title="削除">×</button>
    </div>`).join('');
}
function removeAddressee(i){ addressees.splice(i,1); renderToList(); }
function addAddressee(){
  const v=document.getElementById('toAddInput').value.trim();
  if(!v){toast('⚠ 宛先名を入力してください');return;}
  addressees.push(v);
  document.getElementById('toAddInput').value='';
  renderToList();
}
function saveAddressees(){
  // collect edited values from inputs
  document.querySelectorAll('#toList .to-list-item input').forEach((inp,i)=>{
    if(inp.value.trim()) addressees[i]=inp.value.trim();
  });
  addressees = addressees.filter(a=>a.trim());
  if(!addressees.length){ addressees=['SK','AO']; }
  saveAddr();
  closeModal('toModal');
  // refresh the select in the form if open
  const sel = document.getElementById('toSelect');
  if(sel){
    const cur = sel.value;
    sel.innerHTML = addressees.map(a=>`<option value="${a}" ${a===cur?'selected':''}>${a} 御中</option>`).join('');
  }
  toast('✓ 宛先リストを更新しました');
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const el=document.getElementById('estimateList');
  const filtered=[...estimates].filter(e=>(e.siteId||'').includes(q)||(e.name||'').toLowerCase().includes(q)).reverse();
  if(!filtered.length){el.innerHTML='<div class="empty-list">該当する見積がありません</div>';return;}
  el.innerHTML=filtered.map(e=>{
    const lv=e.versions[e.versions.length-1];
    const {grand}=calcVersionTotals(lv);
    const sel=e._id===currentId?'selected':'';
    const date=lv.updatedAt?new Date(lv.updatedAt).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}):'';
    const vc=e.versions.length;
    return `<div class="estimate-item ${sel}" onclick="loadEstimate('${e._id}')">
      <div class="ei-num">No. ${e.siteId||'------'} <span class="ei-ver">${lv.verLabel}</span>${e.addressee?`<span class="ei-to">${e.addressee}</span>`:''}</div>
      <div class="ei-name">${e.name||'（現場名未入力）'}</div>
      <div class="ei-meta"><span>${date}${vc>1?' · '+vc+'版':''}</span><span class="ei-total">${fmtY(Math.round(grand))}</span></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   NEW / LOAD
══════════════════════════════════════ */
function newEstimate(){
  const est={_id:uid(),siteId:'',name:'',company:'NK',addressee:addressees[0]||'SK',createdAt:new Date().toISOString(),versions:[blankVersion('第1版')]};
  estimates.push(est);
  saveAll();
  currentId=est._id; currentVer=0;
  renderList(); renderForm();
}
function loadEstimate(id){
  currentId=id;
  currentVer=getEst().versions.length-1;
  renderList(); renderForm();
}

/* ══════════════════════════════════════
   RENDER FORM
══════════════════════════════════════ */
function renderForm(){
  const est=getEst(); if(!est) return;
  const ver=est.versions[currentVer];
  const {subtotal,tax,grand}=calcVersionTotals(ver);
  const isLatest=currentVer===est.versions.length-1;

  const idVal=est.siteId||'';
  const idChk=idVal?validateSiteId(idVal,est._id):{ok:true,msg:''};

  const chips=est.versions.map((v,i)=>
    `<button class="ver-chip ${i===currentVer?'active':''}" onclick="switchVersion(${i})">${v.verLabel}</button>`
  ).join('');

  const toOpts=addressees.map(a=>`<option value="${a}" ${a===est.addressee?'selected':''}>${a} 御中</option>`).join('');

  /* ── pattern blocks ── */
  const patternsHtml=ver.patterns.map((pat,pi)=>{
    const pSub=calcPatternSub(pat);
    const rows=pat.items.map((item,ii)=>{
      const lt=(parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
      const unitOpts=UNIT_OPTIONS.map(u=>`<option value="${u}" ${item.unit===u?'selected':''}>${u}</option>`).join('');
      const dis=isLatest?'':'disabled';
      return `<tr>
        <td><span class="row-num">${ii+1}</span></td>
        <td><input type="text" value="${item.name}" placeholder="項目名" ${dis} onchange="updateItem(${pi},${ii},'name',this.value)"></td>
        <td><input type="number" class="num-input" value="${item.qty}" placeholder="0" min="0" ${dis} onchange="updateItem(${pi},${ii},'qty',this.value)"></td>
        <td><select ${dis} onchange="updateItem(${pi},${ii},'unit',this.value)">${unitOpts}</select></td>
        <td><input type="number" class="num-input" value="${item.price}" placeholder="0" min="0" ${dis} onchange="updateItem(${pi},${ii},'price',this.value)"></td>
        <td><div class="total-cell" id="lt-${pi}-${ii}">${lt?fmt(lt):'—'}</div></td>
        <td>${isLatest?`<button class="del-btn" onclick="removeItem(${pi},${ii})">×</button>`:''}</td>
      </tr>`;
    }).join('');

    const canDel=isLatest&&ver.patterns.length>1;
    return `<div class="pattern-block" id="pat-${pi}">
      <div class="pattern-header">
        <input class="pattern-label-input" type="text" value="${pat.label}"
          ${!isLatest?'readonly':''}
          onchange="updatePatLabel(${pi},this.value)" placeholder="パターン名">
        ${canDel?`<button class="pattern-del-btn" onclick="removePattern(${pi})">このパターンを削除</button>`:''}
      </div>
      <div class="pattern-body">
        <table class="items-table">
          <thead><tr>
            <th class="col-no">No.</th>
            <th class="col-name">項目名</th>
            <th class="col-qty">数量</th>
            <th class="col-unit">単位</th>
            <th class="col-price">単価（円）</th>
            <th class="col-total">合計（円）</th>
            <th class="col-del"></th>
          </tr></thead>
          <tbody id="tbody-${pi}">${rows}</tbody>
        </table>
        ${isLatest?`<button class="add-row-btn" onclick="addItem(${pi})">＋ 行を追加</button>`:''}
        <div class="pattern-subtotal">
          <div class="pattern-subtotal-box">
            <span class="pattern-subtotal-label">${pat.label} 小計</span>
            <span class="pattern-subtotal-val" id="psub-${pi}">${fmtY(pSub)}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`
  <div class="panel">
    <div class="form-header">
      <div>
        <div class="form-title">見積入力フォーム</div>
        <div class="form-id" id="formIdDisplay">No. ${idVal||'------'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--ink3);letter-spacing:1px">作成日</div>
        <div style="font-size:13px;font-weight:500">${new Date(est.createdAt).toLocaleDateString('ja-JP')}</div>
      </div>
    </div>

    <!-- TOP FIELDS -->
    <div class="fields-band">
      <div class="fields-grid">
        <div class="field-group">
          <label class="field-label">現場ナンバー</label>
          <input class="field-input id-input ${idVal&&!idChk.ok?'error':''}" type="text"
            id="siteIdInput" value="${idVal}" placeholder="例：123456" maxlength="6"
            ${!isLatest?'readonly':''}
            oninput="onSiteIdInput(this.value)" onblur="renderList()">
          <div class="field-hint ${idVal&&!idChk.ok?'error-hint':''}" id="siteIdHint">
            ${idVal&&!idChk.ok?idChk.msg:idVal&&idChk.ok?'✓ 使用可能':'他システムの番号を6桁で入力'}
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">現場名</label>
          <input class="field-input" type="text" value="${est.name}" placeholder="現場名を入力"
            ${!isLatest?'readonly':''}
            oninput="updateEstField('name',this.value)">
        </div>
        <div class="field-group">
          <label class="field-label">宛先</label>
          <div class="to-row">
            <select id="toSelect" ${!isLatest?'disabled':''} onchange="updateEstField('addressee',this.value)">${toOpts}</select>
            ${isLatest?`<button class="to-edit-btn" onclick="openAddresseeModal()">編集</button>`:''}
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">会社名</label>
          <input class="field-input" type="text" value="${est.company}"
            ${!isLatest?'readonly':''}
            oninput="updateEstField('company',this.value)">
        </div>
      </div>
    </div>

    <!-- VERSION BAR -->
    <div class="ver-bar">
      <span class="ver-bar-label">版</span>
      <div class="ver-chips">${chips}</div>
      ${isLatest
        ?`<button class="new-ver-btn" onclick="openNewVersionModal()">＋ 新版を追加</button>`
        :`<span class="readonly-badge">📖 過去版（閲覧のみ）</span>`}
    </div>

    <!-- PATTERNS -->
    <div class="form-body">
      ${patternsHtml}
      ${isLatest?`<button class="add-pattern-btn" onclick="addPattern()">＋ パターンを追加</button>`:''}

      <!-- BOTTOM TOTALS + REMARKS -->
      <div class="bottom-grid">
        <div class="remarks-area">
          <label>備考</label>
          <textarea placeholder="備考・特記事項" ${!isLatest?'readonly':''} oninput="updateVerField('remarks',this.value)">${ver.remarks||''}</textarea>
        </div>
        <div class="totals-box">
          <div class="totals-row"><span class="totals-label">合計（税抜）</span><span class="totals-value" id="tv-sub">${fmtY(subtotal)}</span></div>
          <div class="totals-row"><span class="totals-label">消費税（${TAX_RATE*100|0}%）</span><span class="totals-value" id="tv-tax">${fmtY(tax)}</span></div>
          <div class="totals-row grand"><span class="totals-label">合計金額（税込）</span><span class="totals-value" id="tv-grand">${fmtY(grand)}</span></div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-danger" onclick="openDeleteModal('${est._id}')">🗑 削除</button>
      <button class="btn btn-outline" onclick="openPrintModal()">🖨 印刷 / PDF</button>
      ${isLatest?`<button class="btn btn-primary" onclick="saveEstimate()">💾 保存</button>`:''}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   FIELD / ITEM / PATTERN UPDATES
══════════════════════════════════════ */
function onSiteIdInput(val){
  const est=getEst(); if(!est) return;
  const clean=val.replace(/\D/g,'').slice(0,6);
  est.siteId=clean;
  const inp=document.getElementById('siteIdInput');
  const hint=document.getElementById('siteIdHint');
  const disp=document.getElementById('formIdDisplay');
  if(disp) disp.textContent='No. '+(clean||'------');
  if(!inp||!hint) return;
  if(clean.length===6){
    const chk=validateSiteId(clean,est._id);
    if(!chk.ok){inp.classList.add('error');hint.className='field-hint error-hint';hint.textContent=chk.msg;}
    else{inp.classList.remove('error');hint.className='field-hint';hint.textContent='✓ 使用可能';}
  } else {
    inp.classList.remove('error');hint.className='field-hint';hint.textContent=clean.length+' / 6桁';
  }
}
function updateEstField(key,val){
  const est=getEst(); if(!est) return;
  est[key]=val;
  if(key==='name') renderList();
}
function updateVerField(key,val){
  const ver=activeVer(); if(!ver) return;
  ver[key]=val;
}
function updatePatLabel(pi,val){
  const ver=activeVer(); if(!ver) return;
  ver.patterns[pi].label=val;
  // refresh subtotal label
  const el=document.getElementById('psub-'+pi);
  if(el) el.previousElementSibling.textContent=val+' 小計';
}
function updateItem(pi,ii,key,val){
  const ver=activeVer(); if(!ver) return;
  ver.patterns[pi].items[ii][key]=val;
  refreshTotals();
}
function refreshTotals(){
  const ver=activeVer(); if(!ver) return;
  ver.patterns.forEach((pat,pi)=>{
    pat.items.forEach((item,ii)=>{
      const lt=(parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
      const el=document.getElementById(`lt-${pi}-${ii}`);
      if(el) el.textContent=lt?fmt(lt):'—';
    });
    const pSub=calcPatternSub(pat);
    const ps=document.getElementById('psub-'+pi);
    if(ps) ps.textContent=fmtY(pSub);
  });
  const {subtotal,tax,grand}=calcVersionTotals(ver);
  const s=document.getElementById('tv-sub'),t=document.getElementById('tv-tax'),g=document.getElementById('tv-grand');
  if(s)s.textContent=fmtY(subtotal); if(t)t.textContent=fmtY(tax); if(g)g.textContent=fmtY(grand);
}

function addItem(pi){
  const ver=activeVer(); if(!ver) return;
  ver.patterns[pi].items.push(blankItem());
  renderForm();
}
function removeItem(pi,ii){
  const ver=activeVer(); if(!ver) return;
  const pat=ver.patterns[pi];
  if(pat.items.length===1) pat.items=[blankItem()]; else pat.items.splice(ii,1);
  renderForm();
}
function addPattern(){
  const ver=activeVer(); if(!ver) return;
  ver.patterns.push(blankPattern(`パターン${ver.patterns.length+1}`));
  renderForm();
  // scroll to bottom
  setTimeout(()=>{ const el=document.querySelector('.add-pattern-btn'); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); },100);
}
function removePattern(pi){
  const ver=activeVer(); if(!ver||ver.patterns.length<=1) return;
  ver.patterns.splice(pi,1);
  renderForm();
}

/* ══════════════════════════════════════
   VERSION
══════════════════════════════════════ */
function switchVersion(idx){ currentVer=idx; renderForm(); }
function openNewVersionModal(){
  const est=getEst(); if(!est) return;
  const nextLabel=`第${est.versions.length+1}版`;
  document.getElementById('newVerModalMsg').innerHTML=
    `現在の <strong>${est.versions[currentVer].verLabel}</strong> の内容をコピーして、<strong>${nextLabel}</strong> を作成します。過去の版はそのまま閲覧できます。`;
  openModal('newVerModal');
}
function confirmNewVersion(){
  const est=getEst(); if(!est) return;
  const prev=est.versions[est.versions.length-1];
  const nv={
    verLabel:`第${est.versions.length+1}版`,
    patterns:JSON.parse(JSON.stringify(prev.patterns)),
    remarks:prev.remarks,
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };
  est.versions.push(nv); currentVer=est.versions.length-1;
  saveAll(); renderList(); closeModal('newVerModal'); renderForm();
  toast(`✓ ${nv.verLabel} を作成しました`);
}

/* ══════════════════════════════════════
   SAVE
══════════════════════════════════════ */
function saveEstimate(){
  const est=getEst(); if(!est) return;
  const chk=validateSiteId(est.siteId,est._id);
  if(!chk.ok){toast('⚠ '+chk.msg);return;}
  activeVer().updatedAt=new Date().toISOString();
  saveAll(); renderList(); toast('✓ 保存しました');
}

/* ══════════════════════════════════════
   DELETE
══════════════════════════════════════ */
function openDeleteModal(id){
  deleteTargetId=id;
  const est=estimates.find(e=>e._id===id);
  document.getElementById('deleteModalMsg').textContent=`「${est?.name||'No.'+est?.siteId}」をすべての版ごと削除しますか？この操作は元に戻せません。`;
  openModal('deleteModal');
}
function confirmDelete(){
  estimates=estimates.filter(e=>e._id!==deleteTargetId);
  if(currentId===deleteTargetId){
    currentId=null; currentVer=null;
    document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="empty-state-icon">📋</div><h3>見積を選択または新規作成</h3><p>左のサイドバーから見積を選ぶか、「新規」ボタンで作成してください。</p></div>`;
  }
  saveAll(); renderList(); closeModal('deleteModal'); toast('削除しました');
}

/* ══════════════════════════════════════
   PRINT / PDF
══════════════════════════════════════ */
function buildFilename(){
  const est=getEst(); const ver=activeVer();
  if(!est||!ver) return 'estimate';
  const site=(est.name||'現場名').replace(/[\\/:*?"<>|]/g,'');
  return `${todayStr()}_${est.siteId||'000000'}_${site}_見積もり`;
}
function openPrintModal(){
  document.getElementById('pdfFilename').textContent=buildFilename()+'.pdf';
  openModal('printModal');
}
function executePrint(){
  closeModal('printModal');
  const est=getEst(); const ver=activeVer();
  if(!est||!ver) return;
  const {subtotal,tax,grand}=calcVersionTotals(ver);
  const fn=buildFilename();
  const issueDate=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  /* build per-pattern HTML */
  const patternsHtml=ver.patterns.map((pat,pi)=>{
    const pSub=calcPatternSub(pat);
    const rows=pat.items.map((item,ii)=>{

/* ══════════════════════════════════════
   FULL-TEXT SEARCH ENGINE
══════════════════════════════════════ */
// Build a flat searchable corpus for one estimate
function buildCorpus(e) {
  const tokens = [];
  const add = (field, val) => { if(val) tokens.push({field, val: String(val)}); };

  add('現場No', e.siteId);
  add('現場名', e.name);
  add('宛先',   e.addressee);
  add('会社名', e.company);

  e.versions.forEach(v => {
    add('版',   v.verLabel);
    add('備考', v.remarks);
    // date variants
    if(v.updatedAt) {
      const d = new Date(v.updatedAt);
      add('更新日', d.toLocaleDateString('ja-JP'));
      add('更新日', `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
      add('更新日', `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`);
      add('更新日', `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    }
    v.patterns.forEach(p => {
      add('パターン名', p.label);
      p.items.forEach(i => {
        add('項目名', i.name);
        add('単位',   i.unit);
        if(i.price) add('単価', String(i.price));
      });
    });
  });
  return tokens;
}

// Search: returns {matched:bool, hits:[{field,val,excerpt}]}
function searchEstimate(e, query) {
  if(!query.trim()) return {matched:true, hits:[]};
  const q = query.trim().toLowerCase();
  const tokens = buildCorpus(e);
  const hits = [];
  const seenFields = new Set();
  tokens.forEach(({field, val}) => {
    const lo = val.toLowerCase();
    if(lo.includes(q)) {
      // build excerpt with highlight position
      const idx = lo.indexOf(q);
      const start = Math.max(0, idx-14);
      const end   = Math.min(val.length, idx+q.length+14);
      const pre   = (start>0?'…':'')+esc(val.slice(start,idx));
      const mid   = `<mark>${esc(val.slice(idx,idx+q.length))}</mark>`;
      const post  = esc(val.slice(idx+q.length,end))+(end<val.length?'…':'');
      const key   = field+'|'+val.toLowerCase().slice(0,40);
      if(!seenFields.has(key)){
        hits.push({field, excerpt: pre+mid+post});
        seenFields.add(key);
      }
    }
  });
  return {matched: hits.length>0, hits};
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Active filter state for DB view
let dbQuery  = '';
let dbSort   = {col:'date', dir:-1}; // dir: 1=asc, -1=desc
let dbFilter = 'all'; // 'all' | field label

function renderDbView(){
  if(!estimates.length){
    document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="empty-state-icon">🗄️</div><h3>データがありません</h3><p>見積を保存するとここに一覧表示されます。</p></div>`;
    return;
  }

  // Run search on all estimates, latest version only for display
  let results = estimates.map(e => {
    const res = searchEstimate(e, dbQuery);
    return {e, ...res};
  }).filter(r => r.matched);

  // Sort
  results.sort((a,b) => {
    const ea=a.e, eb=b.e;
    const lva=ea.versions[ea.versions.length-1], lvb=eb.versions[eb.versions.length-1];
    let va,vb;
    if(dbSort.col==='siteId') { va=ea.siteId||''; vb=eb.siteId||''; }
    else if(dbSort.col==='name') { va=ea.name||''; vb=eb.name||''; }
    else if(dbSort.col==='addressee') { va=ea.addressee||''; vb=eb.addressee||''; }
    else if(dbSort.col==='grand') { const ca=calcVersionTotals(lva), cb=calcVersionTotals(lvb); va=ca.grand; vb=cb.grand; }
    else { va=lva.updatedAt||''; vb=lvb.updatedAt||''; }
    if(va<vb) return -1*dbSort.dir; if(va>vb) return 1*dbSort.dir; return 0;
  });

  const sortArrow = col => {
    const a = dbSort.col===col ? (dbSort.dir===1?'▲':'▼') : '⇅';
    return `<span class="sort-arrow">${a}</span>`;
  };
  const thClass = col => dbSort.col===col ? 'sorted' : '';

  const tableRows = results.map(({e, hits}) => {
    const lv = e.versions[e.versions.length-1];
    const {grand} = calcVersionTotals(lv);
    const vc = e.versions.length;
    const date = lv.updatedAt ? new Date(lv.updatedAt).toLocaleDateString('ja-JP') : '—';

    // build hit detail snippets (max 3 shown, excluding basic fields already in cols)
    const detailHits = hits.filter(h=>!['現場No','現場名','宛先','更新日'].includes(h.field)).slice(0,4);
    const detailHtml = detailHits.length
      ? `<div class="db-match-detail">${detailHits.map(h=>`<span style="margin-right:10px"><span style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:10px;color:var(--ink3)">${h.field}</span> ${h.excerpt}</span>`).join('')}</div>`
      : '';

    // highlight basic columns if query hits them
    const hlSiteId = hlField(hits,'現場No', e.siteId||'------');
    const hlName   = hlField(hits,'現場名',  e.name||'—');
    const hlAddr   = hlField(hits,'宛先',    (e.addressee||'—')+' 御中');
    const hlDate   = hlField(hits,'更新日',  date);

    const rowClass = dbQuery && hits.length ? 'match-row' : '';

    return `<tr class="${rowClass}" onclick="openFromDb('${e._id}')">
      <td>
        <span style="font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1a3a5c">${hlSiteId}</span>
      </td>
      <td>
        <div style="font-weight:500">${hlName}</div>
        ${detailHtml}
      </td>
      <td><span style="background:var(--teal-light);color:var(--teal);border:1px solid #8abfb0;border-radius:3px;padding:1px 7px;font-size:11px;font-weight:600">${hlAddr}</span></td>
      <td style="text-align:center">
        <span style="background:var(--gold-light);color:var(--gold);border:1px solid #d4b87a;border-radius:3px;padding:1px 7px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600">${lv.verLabel}</span>
        ${vc>1?`<div style="font-size:10px;color:var(--ink3);margin-top:2px">全${vc}版</div>`:''}
      </td>
      <td style="text-align:center;font-size:12px;color:var(--ink2)">${lv.patterns.length}パターン</td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1a3a5c">¥ ${(Math.round(grand)).toLocaleString('ja-JP')}</td>
      <td style="font-size:12px;color:var(--ink2)">${hlDate}</td>
    </tr>`;
  }).join('');

  const noResults = results.length===0
    ? `<tr><td colspan="7" class="db-no-results">🔍「${esc(dbQuery)}」に一致する見積が見つかりませんでした</td></tr>`
    : '';

  const metaText = dbQuery
    ? `<strong>${results.length}</strong> / ${estimates.length} 件がヒット`
    : `全 <strong>${estimates.length}</strong> 件`;

  document.getElementById('mainContent').innerHTML=`
  <div class="panel">
    <div class="form-header">
      <div>
        <div class="form-title">見積データ一覧</div>
        <div style="font-size:13px;margin-top:4px;color:var(--ink2)">${metaText}</div>
      </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="db-search-bar">
      <div class="db-search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="db-search-input" id="dbSearchInput" type="text"
          placeholder="現場No・現場名・宛先・項目名・備考・日付など全文検索..."
          value="${esc(dbQuery)}"
          oninput="onDbSearch(this.value)">
        <button class="db-search-clear ${dbQuery?'visible':''}" id="dbClearBtn" onclick="onDbSearch('')" title="クリア">×</button>
      </div>
      <div class="db-search-meta" id="dbMeta">${metaText}</div>
    </div>

    <!-- SEARCH SCOPE HINT -->
    <div style="padding:8px 28px 10px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-weight:700;letter-spacing:1px;text-transform:uppercase">検索対象：</span>
      ${['現場No','現場名','宛先','会社名','版','パターン名','項目名','単位','単価','備考','更新日'].map(f=>
        `<span style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1px 8px">${f}</span>`
      ).join('')}
    </div>

    <!-- TABLE -->
    <div class="db-table-wrap">
      <table class="db-table">
        <thead><tr>
          <th class="${thClass('siteId')}" onclick="dbSortBy('siteId')">現場No. ${sortArrow('siteId')}</th>
          <th class="${thClass('name')}"   onclick="dbSortBy('name')">現場名 ${sortArrow('name')}</th>
          <th class="${thClass('addressee')}" onclick="dbSortBy('addressee')">宛先 ${sortArrow('addressee')}</th>
          <th style="text-align:center">最新版</th>
          <th style="text-align:center">パターン</th>
          <th class="${thClass('grand')}" onclick="dbSortBy('grand')" style="text-align:right">合計金額（税込） ${sortArrow('grand')}</th>
          <th class="${thClass('date')}"  onclick="dbSortBy('date')"  style="white-space:nowrap">更新日 ${sortArrow('date')}</th>
        </tr></thead>
        <tbody id="dbTbody">${tableRows||noResults}</tbody>
      </table>
    </div>
    <div style="padding:8px 28px 16px;font-size:12px;color:var(--ink3)">※ 行をクリックすると見積の編集画面を開きます。列ヘッダーをクリックすると並び替えができます。</div>
  </div>`;
}

// Highlight helper: returns html with <mark> if field matches query
function hlField(hits, field, rawVal) {
  const hit = hits.find(h=>h.field===field);
  if(!hit||!dbQuery.trim()) return esc(rawVal);
  // highlight all occurrences
  const q = dbQuery.trim();
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(rawVal).replace(re, m=>`<mark>${m}</mark>`);
}

function onDbSearch(val){
  dbQuery=val;
  // update input value if called from clear btn
  const inp=document.getElementById('dbSearchInput');
  if(inp&&inp.value!==val) inp.value=val;
  const clr=document.getElementById('dbClearBtn');
  if(clr) clr.classList.toggle('visible', val.length>0);
  // re-render table only (not full panel)
  renderDbView();
}

function dbSortBy(col){
  if(dbSort.col===col) dbSort.dir*=-1;
  else { dbSort.col=col; dbSort.dir= col==='date'?-1:1; }
  renderDbView();
}

function openFromDb(id){
  currentId=id; currentVer=estimates.find(e=>e._id===id).versions.length-1;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.nav-btn').classList.add('active');
  renderList(); renderForm();
}

/* ══════════════════════════════════════
   MIGRATION  v2 → v3
══════════════════════════════════════ */
(function migrate(){
  const old=JSON.parse(localStorage.getItem('nk_estimates_v2')||'[]');
  if(!old.length) return;
  const existing=new Set(estimates.map(e=>e._id));
  old.forEach(e=>{
    if(existing.has(e._id)) return;
    estimates.push({
      _id:e._id||uid(), siteId:e.siteId||'', name:e.name||'', company:e.company||'NK',
      addressee:addressees[0]||'SK', createdAt:e.createdAt||new Date().toISOString(),
      versions:(e.versions||[{verLabel:'第1版',items:e.items||[blankItem()],remarks:e.remarks||'',createdAt:e.createdAt||new Date().toISOString(),updatedAt:e.updatedAt||new Date().toISOString()}]).map(v=>({
        verLabel:v.verLabel||'第1版',
        patterns:[{label:'パターン1',items:v.items||[blankItem()]}],
        remarks:v.remarks||'',
        createdAt:v.createdAt||new Date().toISOString(),
        updatedAt:v.updatedAt||new Date().toISOString()
      }))
    });
  });
  saveAll();
})();
