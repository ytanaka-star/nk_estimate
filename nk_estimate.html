<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NK 見積入力システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ed;
    --surface: #ffffff;
    --surface2: #faf9f6;
    --border: #d6d1c7;
    --border-strong: #a89f8f;
    --ink: #1a1814;
    --ink2: #5a5650;
    --ink3: #8a857e;
    --accent: #1a3a5c;
    --accent2: #2a5a8c;
    --accent-light: #e8eef5;
    --danger: #8c2a2a;
    --danger-light: #f5e8e8;
    --success: #2a5c3a;
    --gold: #8c6a1a;
    --gold-light: #f5efd8;
    --radius: 4px;
    --shadow: 0 2px 12px rgba(26,24,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,24,20,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* HEADER */
  header { background: var(--accent); color: #fff; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .brand-badge { background: #fff; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 16px; padding: 2px 10px; border-radius: 2px; letter-spacing: 2px; }
  .brand-title { font-size: 13px; font-weight: 300; letter-spacing: 3px; opacity: 0.9; }
  .header-nav { display: flex; gap: 4px; }
  .nav-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 16px; border-radius: var(--radius); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; transition: all 0.15s; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); }
  .nav-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }

  /* LAYOUT */
  .app { display: flex; min-height: calc(100vh - 56px); }

  /* SIDEBAR */
  .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--ink3); text-transform: uppercase; }
  .new-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .new-btn:hover { background: var(--accent2); }
  .search-box { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .search-box input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; background: var(--surface2); color: var(--ink); outline: none; transition: border-color 0.15s; }
  .search-box input:focus { border-color: var(--accent2); }
  .estimate-list { flex: 1; overflow-y: auto; }
  .estimate-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .estimate-item:hover { background: var(--surface2); }
  .estimate-item.selected { background: var(--accent-light); border-left: 3px solid var(--accent); }
  .estimate-item.selected .ei-num { color: var(--accent); }
  .ei-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--ink3); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
  .ei-name { font-size: 13px; font-weight: 500; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ei-meta { font-size: 11px; color: var(--ink3); display: flex; justify-content: space-between; align-items: center; }
  .ei-total { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--accent); }
  .ei-ver { display: inline-block; background: var(--gold-light); color: var(--gold); border: 1px solid #d4b87a; border-radius: 3px; font-size: 10px; font-weight: 700; padding: 1px 5px; font-family: 'IBM Plex Mono', monospace; }
  .empty-list { padding: 40px 16px; text-align: center; color: var(--ink3); font-size: 13px; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; padding: 32px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; box-shadow: var(--shadow); max-width: 900px; margin: 0 auto; }

  /* FORM HEADER */
  .form-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: 6px 6px 0 0; flex-wrap: wrap; gap: 12px; }
  .form-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--ink3); text-transform: uppercase; }
  .form-id { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: var(--accent); letter-spacing: 2px; }

  /* VERSION BAR */
  .ver-bar { display: flex; align-items: center; gap: 8px; padding: 10px 28px; background: var(--gold-light); border-bottom: 1px solid #d4b87a; flex-wrap: wrap; }
  .ver-bar-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
  .ver-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .ver-chip { padding: 3px 12px; border-radius: 20px; border: 1px solid #d4b87a; background: #fff; color: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
  .ver-chip:hover { background: #ffe8a0; }
  .ver-chip.active { background: var(--gold); color: #fff; border-color: var(--gold); }
  .new-ver-btn { margin-left: auto; display: flex; align-items: center; gap: 5px; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; transition: all 0.12s; white-space: nowrap; }
  .new-ver-btn:hover { background: var(--gold); color: #fff; }

  /* FIELDS */
  .form-body { padding: 24px 28px; }
  .fields-grid { display: grid; grid-template-columns: 200px 1fr 120px; gap: 16px; margin-bottom: 24px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--ink3); text-transform: uppercase; }
  .field-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--ink); background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .field-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(42,90,140,0.08); }
  .field-input.id-input { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; letter-spacing: 2px; color: var(--accent); }
  .field-input.id-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(140,42,42,0.10); }
  .field-hint { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .field-hint.error-hint { color: var(--danger); }

  /* ITEMS TABLE */
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--ink3); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .items-table th { background: var(--accent); color: #fff; padding: 9px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-align: left; white-space: nowrap; }
  .items-table th:first-child { border-radius: 3px 0 0 0; }
  .items-table th:last-child { border-radius: 0 3px 0 0; }
  .items-table td { padding: 4px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .items-table tr:hover td { background: var(--surface2); }
  .items-table td input, .items-table td select { width: 100%; padding: 7px 8px; border: 1px solid transparent; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--ink); background: transparent; outline: none; transition: border-color 0.1s, background 0.1s; }
  .items-table td input:focus, .items-table td select:focus { border-color: var(--accent2); background: #fff; box-shadow: 0 0 0 2px rgba(42,90,140,0.08); }
  .items-table td input.num-input { font-family: 'IBM Plex Mono', monospace; text-align: right; }
  .total-cell { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; text-align: right; padding: 7px 8px; color: var(--accent); }
  .del-btn { width: 28px; height: 28px; border: none; background: transparent; color: var(--ink3); cursor: pointer; border-radius: var(--radius); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; margin: 0 auto; }
  .del-btn:hover { background: var(--danger-light); color: var(--danger); }
  .col-no { width: 40px; text-align: center; }
  .col-name { min-width: 200px; }
  .col-qty { width: 80px; }
  .col-unit { width: 80px; }
  .col-price { width: 110px; }
  .col-total { width: 120px; }
  .col-del { width: 36px; }
  .add-row-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px dashed var(--border-strong); color: var(--ink2); padding: 7px 16px; border-radius: var(--radius); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; transition: all 0.15s; margin-bottom: 24px; }
  .add-row-btn:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }

  /* BOTTOM */
  .bottom-grid { display: grid; grid-template-columns: 1fr 280px; gap: 24px; margin-top: 8px; }
  .remarks-area label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--ink3); text-transform: uppercase; margin-bottom: 6px; }
  .remarks-area textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; outline: none; transition: border-color 0.15s; }
  .remarks-area textarea:focus { border-color: var(--accent2); }
  .totals-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .totals-row:last-child { border-bottom: none; }
  .totals-label { font-size: 12px; color: var(--ink2); }
  .totals-value { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--ink); }
  .totals-row.grand { background: var(--accent); }
  .totals-row.grand .totals-label { color: rgba(255,255,255,0.8); font-weight: 700; }
  .totals-row.grand .totals-value { color: #fff; font-size: 18px; }

  /* ACTIONS */
  .form-actions { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--surface2); border-radius: 0 0 6px 6px; flex-wrap: wrap; }
  .btn { padding: 9px 22px; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; display: flex; align-items: center; gap: 6px; }
  .btn-outline { background: transparent; border-color: var(--border-strong); color: var(--ink2); }
  .btn-outline:hover { border-color: var(--ink2); color: var(--ink); background: var(--surface2); }
  .btn-danger { background: transparent; border-color: #c8a0a0; color: var(--danger); }
  .btn-danger:hover { background: var(--danger-light); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; color: var(--ink3); text-align: center; gap: 12px; }
  .empty-state-icon { font-size: 48px; opacity: 0.4; }
  .empty-state h3 { font-size: 16px; color: var(--ink2); font-weight: 500; }
  .empty-state p { font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #fff; border-radius: 6px; padding: 28px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h3 { font-size: 16px; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--ink2); margin-bottom: 20px; line-height: 1.7; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

  .row-num { text-align: center; font-size: 12px; color: var(--ink3); font-family: 'IBM Plex Mono', monospace; }
  .readonly-badge { margin-left:auto; font-size:11px; color:var(--gold); background:#fff3cc; padding:3px 10px; border-radius:4px; border:1px solid #d4b87a; white-space:nowrap; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="brand-badge">NK</span>
    <span class="brand-title">見積入力システム</span>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showView('form',event)">見積入力</button>
    <button class="nav-btn" onclick="showView('db',event)">データ一覧</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">保存済み見積</span>
      <button class="new-btn" onclick="newEstimate()">＋ 新規</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="番号・現場名で検索..." oninput="renderList()">
    </div>
    <div class="estimate-list" id="estimateList"></div>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <h3>見積を選択または新規作成</h3>
      <p>左のサイドバーから見積を選ぶか、「新規」ボタンで作成してください。</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑 見積の削除</h3>
    <p id="deleteModalMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('deleteModal')">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- NEW VERSION MODAL -->
<div class="modal-overlay" id="newVerModal">
  <div class="modal">
    <h3>📄 新しい版を作成</h3>
    <p id="newVerModalMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('newVerModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmNewVersion()">新版を作成</button>
    </div>
  </div>
</div>

<!-- PRINT MODAL -->
<div class="modal-overlay" id="printModal">
  <div class="modal" style="max-width:480px">
    <h3>🖨 印刷 / PDF出力</h3>
    <p>印刷ダイアログが開きます。PDFとして保存する場合は、プリンター欄で <strong>「PDFに保存」</strong> を選択してください。<br>ファイル名は以下を推奨します：</p>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:20px;">
      <div style="font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:1px;margin-bottom:4px">推奨ファイル名</div>
      <div id="pdfFilename" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);word-break:break-all;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('printModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="executePrint()">印刷を開始</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let estimates  = JSON.parse(localStorage.getItem('nk_estimates_v2') || '[]');
let currentId  = null;
let currentVer = null;
let deleteTargetId = null;
const TAX_RATE = 0.10;
const UNIT_OPTIONS = ['式','個','枚','本','m','m²','kg','台','セット','箱','冊'];

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n) {
  if (n === '' || n === null || n === undefined || isNaN(Number(n))) return '—';
  return Number(n).toLocaleString('ja-JP');
}
function fmtYen(n) { return isNaN(n) ? '¥ —' : '¥ ' + Number(n).toLocaleString('ja-JP'); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function saveAll() { localStorage.setItem('nk_estimates_v2', JSON.stringify(estimates)); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function blankItem()    { return { name:'', qty:'', unit:'式', price:'' }; }
function blankVersion(label) {
  return { verLabel: label, items: [blankItem()], remarks: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
}
function getEst()        { return estimates.find(e => e._id === currentId); }
function activeVer()     { const e = getEst(); return e ? e.versions[currentVer] : null; }
function calcTotals(ver) {
  const sub = (ver.items||[]).reduce((s,i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.price)||0), 0);
  const tax = Math.round(sub * TAX_RATE);
  return { subtotal: sub, tax, grand: sub + tax };
}

/* ══════════════════════════════════════
   VALIDATION
══════════════════════════════════════ */
function validateSiteId(val, selfId) {
  if (!val) return { ok: false, msg: '現場ナンバーを入力してください' };
  if (!/^\d{6}$/.test(val)) return { ok: false, msg: '6桁の数字で入力してください' };
  const dup = estimates.find(e => e.siteId === val && e._id !== selfId);
  if (dup) return { ok: false, msg: `No.${val}（${dup.name||'現場名未入力'}）と重複しています` };
  return { ok: true, msg: '' };
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const el = document.getElementById('estimateList');
  const filtered = estimates.filter(e =>
    (e.siteId||'').includes(q) || (e.name||'').toLowerCase().includes(q)
  ).slice().reverse();

  if (!filtered.length) { el.innerHTML = '<div class="empty-list">該当する見積がありません</div>'; return; }

  el.innerHTML = filtered.map(e => {
    const latest = e.versions[e.versions.length-1];
    const { grand } = calcTotals(latest);
    const sel = e._id === currentId ? 'selected' : '';
    const date = latest.updatedAt ? new Date(latest.updatedAt).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}) : '';
    const vc = e.versions.length;
    return `<div class="estimate-item ${sel}" onclick="loadEstimate('${e._id}')">
      <div class="ei-num">No. ${e.siteId||'------'} <span class="ei-ver">${latest.verLabel}</span></div>
      <div class="ei-name">${e.name||'（現場名未入力）'}</div>
      <div class="ei-meta">
        <span>${date}${vc>1?' · '+vc+'版':''}</span>
        <span class="ei-total">${fmtYen(Math.round(grand))}</span>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   NEW / LOAD
══════════════════════════════════════ */
function newEstimate() {
  const est = { _id: uid(), siteId: '', name: '', company: 'NK', createdAt: new Date().toISOString(), versions: [blankVersion('第1版')] };
  estimates.push(est);
  saveAll();
  currentId = est._id;
  currentVer = 0;
  renderList();
  renderForm();
}

function loadEstimate(id) {
  currentId = id;
  const est = getEst();
  currentVer = est.versions.length - 1;
  renderList();
  renderForm();
}

/* ══════════════════════════════════════
   RENDER FORM
══════════════════════════════════════ */
function renderForm() {
  const est = getEst(); if (!est) return;
  const ver = est.versions[currentVer];
  const { subtotal, tax, grand } = calcTotals(ver);
  const isLatest = currentVer === est.versions.length - 1;

  const chips = est.versions.map((v,i) =>
    `<button class="ver-chip ${i===currentVer?'active':''}" onclick="switchVersion(${i})">${v.verLabel}</button>`
  ).join('');

  const idVal = est.siteId || '';
  const idChk = idVal ? validateSiteId(idVal, est._id) : { ok: true, msg: '' };

  const rows = ver.items.map((item, idx) => {
    const lt = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    const unitOpts = UNIT_OPTIONS.map(u => `<option value="${u}" ${item.unit===u?'selected':''}>${u}</option>`).join('');
    const dis = isLatest ? '' : 'disabled';
    return `<tr>
      <td><span class="row-num">${idx+1}</span></td>
      <td><input type="text" value="${item.name}" placeholder="項目名" ${dis} onchange="updateItem(${idx},'name',this.value)"></td>
      <td><input type="number" class="num-input" value="${item.qty}" placeholder="0" min="0" ${dis} onchange="updateItem(${idx},'qty',this.value)"></td>
      <td><select ${dis} onchange="updateItem(${idx},'unit',this.value)">${unitOpts}</select></td>
      <td><input type="number" class="num-input" value="${item.price}" placeholder="0" min="0" ${dis} onchange="updateItem(${idx},'price',this.value)"></td>
      <td><div class="total-cell">${lt ? fmt(lt) : '—'}</div></td>
      <td>${isLatest ? `<button class="del-btn" onclick="removeItem(${idx})">×</button>` : ''}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="form-header">
      <div>
        <div class="form-title">見積入力フォーム</div>
        <div class="form-id" id="formIdDisplay">No. ${idVal||'------'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--ink3);letter-spacing:1px">作成日</div>
        <div style="font-size:13px;font-weight:500">${new Date(est.createdAt).toLocaleDateString('ja-JP')}</div>
      </div>
    </div>

    <div class="ver-bar">
      <span class="ver-bar-label">版</span>
      <div class="ver-chips">${chips}</div>
      ${isLatest
        ? `<button class="new-ver-btn" onclick="openNewVersionModal()">＋ 新版を追加</button>`
        : `<span class="readonly-badge">📖 過去版（閲覧のみ）</span>`}
    </div>

    <div class="form-body">
      <div class="fields-grid">
        <div class="field-group">
          <label class="field-label">現場ナンバー</label>
          <input class="field-input id-input ${idVal&&!idChk.ok?'error':''}" type="text"
            id="siteIdInput" value="${idVal}" placeholder="例：123456" maxlength="6"
            ${!isLatest?'readonly':''}
            oninput="onSiteIdInput(this.value)"
            onblur="renderList()">
          <div class="field-hint ${idVal&&!idChk.ok?'error-hint':''}" id="siteIdHint">
            ${idVal&&!idChk.ok ? idChk.msg : idVal&&idChk.ok ? '✓ 使用可能' : '他システムの番号を6桁で入力'}
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">現場名</label>
          <input class="field-input" type="text" value="${est.name}" placeholder="現場名を入力"
            ${!isLatest?'readonly':''}
            oninput="updateEstField('name',this.value)">
        </div>
        <div class="field-group">
          <label class="field-label">会社名</label>
          <input class="field-input" type="text" value="${est.company}"
            ${!isLatest?'readonly':''}
            oninput="updateEstField('company',this.value)">
        </div>
      </div>

      <div class="section-label">明細 — ${ver.verLabel}</div>
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-no">No.</th>
            <th class="col-name">項目名</th>
            <th class="col-qty">数量</th>
            <th class="col-unit">単位</th>
            <th class="col-price">単価（円）</th>
            <th class="col-total">合計（円）</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="itemsBody">${rows}</tbody>
      </table>
      ${isLatest ? `<button class="add-row-btn" onclick="addItem()">＋ 行を追加</button>` : ''}

      <div class="bottom-grid">
        <div class="remarks-area">
          <label>備考</label>
          <textarea placeholder="備考・特記事項" ${!isLatest?'readonly':''} oninput="updateVerField('remarks',this.value)">${ver.remarks||''}</textarea>
        </div>
        <div class="totals-box">
          <div class="totals-row"><span class="totals-label">小計</span><span class="totals-value" id="tv-sub">${fmtYen(subtotal)}</span></div>
          <div class="totals-row"><span class="totals-label">消費税（${TAX_RATE*100|0}%）</span><span class="totals-value" id="tv-tax">${fmtYen(tax)}</span></div>
          <div class="totals-row grand"><span class="totals-label">合計金額（税込）</span><span class="totals-value" id="tv-grand">${fmtYen(grand)}</span></div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-danger" onclick="openDeleteModal('${est._id}')">🗑 削除</button>
      <button class="btn btn-outline" onclick="openPrintModal()">🖨 印刷 / PDF</button>
      ${isLatest ? `<button class="btn btn-primary" onclick="saveEstimate()">💾 保存</button>` : ''}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   SITE-ID INPUT
══════════════════════════════════════ */
function onSiteIdInput(val) {
  const est = getEst(); if (!est) return;
  const clean = val.replace(/\D/g,'').slice(0,6);
  est.siteId = clean;
  const input = document.getElementById('siteIdInput');
  const hint  = document.getElementById('siteIdHint');
  const disp  = document.getElementById('formIdDisplay');
  if (disp) disp.textContent = 'No. ' + (clean || '------');
  if (!input || !hint) return;
  if (clean.length === 6) {
    const chk = validateSiteId(clean, est._id);
    if (!chk.ok) { input.classList.add('error'); hint.className='field-hint error-hint'; hint.textContent=chk.msg; }
    else          { input.classList.remove('error'); hint.className='field-hint'; hint.textContent='✓ 使用可能'; }
  } else {
    input.classList.remove('error');
    hint.className='field-hint';
    hint.textContent = clean.length + ' / 6桁';
  }
}

/* ══════════════════════════════════════
   FIELD / ITEM UPDATES
══════════════════════════════════════ */
function updateEstField(key, val) {
  const est = getEst(); if (!est) return;
  est[key] = val;
  if (key === 'name') renderList();
}
function updateVerField(key, val) {
  const ver = activeVer(); if (!ver) return;
  ver[key] = val;
}
function updateItem(idx, key, val) {
  const ver = activeVer(); if (!ver) return;
  ver.items[idx][key] = val;
  refreshTotals();
}
function refreshTotals() {
  const ver = activeVer(); if (!ver) return;
  ver.items.forEach((item,idx) => {
    const lt = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    const rows = document.querySelectorAll('#itemsBody tr');
    if (rows[idx]) { const td = rows[idx].querySelector('.total-cell'); if (td) td.textContent = lt ? fmt(lt) : '—'; }
  });
  const { subtotal, tax, grand } = calcTotals(ver);
  const s=document.getElementById('tv-sub'), t=document.getElementById('tv-tax'), g=document.getElementById('tv-grand');
  if (s) s.textContent=fmtYen(subtotal);
  if (t) t.textContent=fmtYen(tax);
  if (g) g.textContent=fmtYen(grand);
}
function addItem() {
  const ver = activeVer(); if (!ver) return;
  ver.items.push(blankItem());
  renderForm();
}
function removeItem(idx) {
  const ver = activeVer(); if (!ver) return;
  if (ver.items.length === 1) ver.items = [blankItem()];
  else ver.items.splice(idx,1);
  renderForm();
}

/* ══════════════════════════════════════
   VERSION MANAGEMENT
══════════════════════════════════════ */
function switchVersion(idx) { currentVer = idx; renderForm(); }

function openNewVersionModal() {
  const est = getEst(); if (!est) return;
  const nextLabel = `第${est.versions.length+1}版`;
  document.getElementById('newVerModalMsg').innerHTML =
    `現在の <strong>${est.versions[currentVer].verLabel}</strong> の内容をコピーして、<strong>${nextLabel}</strong> を作成します。<br>過去の版はそのまま閲覧できます。`;
  openModal('newVerModal');
}
function confirmNewVersion() {
  const est = getEst(); if (!est) return;
  const prev = est.versions[est.versions.length-1];
  const nv = {
    verLabel: `第${est.versions.length+1}版`,
    items: JSON.parse(JSON.stringify(prev.items)),
    remarks: prev.remarks,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  est.versions.push(nv);
  currentVer = est.versions.length - 1;
  saveAll(); renderList(); closeModal('newVerModal'); renderForm();
  toast(`✓ ${nv.verLabel} を作成しました`);
}

/* ══════════════════════════════════════
   SAVE
══════════════════════════════════════ */
function saveEstimate() {
  const est = getEst(); if (!est) return;
  const chk = validateSiteId(est.siteId, est._id);
  if (!chk.ok) { toast('⚠ ' + chk.msg); return; }
  activeVer().updatedAt = new Date().toISOString();
  saveAll(); renderList(); toast('✓ 保存しました');
}

/* ══════════════════════════════════════
   DELETE
══════════════════════════════════════ */
function openDeleteModal(id) {
  deleteTargetId = id;
  const est = estimates.find(e => e._id === id);
  document.getElementById('deleteModalMsg').textContent =
    `「${est?.name||'No.'+est?.siteId}」をすべての版ごと削除しますか？この操作は元に戻せません。`;
  openModal('deleteModal');
}
function confirmDelete() {
  estimates = estimates.filter(e => e._id !== deleteTargetId);
  if (currentId === deleteTargetId) {
    currentId = null; currentVer = null;
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>見積を選択または新規作成</h3><p>左のサイドバーから見積を選ぶか、「新規」ボタンで作成してください。</p></div>`;
  }
  saveAll(); renderList(); closeModal('deleteModal'); toast('削除しました');
}

/* ══════════════════════════════════════
   PRINT / PDF
══════════════════════════════════════ */
function buildFilename() {
  const est = getEst(); const ver = activeVer();
  if (!est||!ver) return 'estimate';
  const site = (est.name||'現場名').replace(/[\\/:*?"<>|]/g,'');
  return `${todayStr()}_${est.siteId||'000000'}_${site}_見積もり`;
}

function openPrintModal() {
  document.getElementById('pdfFilename').textContent = buildFilename() + '.pdf';
  openModal('printModal');
}

function executePrint() {
  closeModal('printModal');
  const est = getEst(); const ver = activeVer();
  if (!est||!ver) return;
  const { subtotal, tax, grand } = calcTotals(ver);
  const fn = buildFilename();
  const issueDate = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  const rows = ver.items.map((item,idx) => {
    const lt = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    return `<tr>
      <td>${idx+1}</td>
      <td>${item.name||''}</td>
      <td class="r">${item.qty||''}</td>
      <td>${item.unit||''}</td>
      <td class="r">${item.price?fmt(item.price):''}</td>
      <td class="r">${lt?fmt(lt):''}</td>
    </tr>`;
  }).join('');

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<title>${fn}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

.site-num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1a3a5c;font-weight:600;letter-spacing:2px;}
.site-name{font-size:16px;font-weight:700;margin-top:4px;}
.ver-badge{display:inline-block;background:#f5efd8;color:#8c6a1a;border:1px solid #d4b87a;border-radius:3px;font-size:10px;font-weight:700;padding:2px 7px;font-family:'IBM Plex Mono',monospace;margin-top:6px;}
.meta-right{text-align:right;flex-shrink:0;}
.company{font-size:18px;font-weight:700;color:#1a3a5c;letter-spacing:2px;}
.issue{font-size:11px;color:#888;margin-top:6px;}
table{width:100%;border-collapse:collapse;margin:14px 0;}
th{background:#1a3a5c;color:#fff;padding:7px 8px;font-size:10.5px;font-weight:700;}
td{padding:6px 8px;border-bottom:1px solid #e0dbd2;font-size:11px;}
tr:nth-child(even) td{background:#f9f8f5;}
.r{text-align:right;font-family:'IBM Plex Mono',monospace;}
.totals-wrap{display:flex;justify-content:flex-end;margin-top:6px;}
.totals{width:260px;border:1px solid #d6d1c7;border-radius:4px;overflow:hidden;}
.t-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #e0dbd2;font-size:11.5px;}
.t-row:last-child{border-bottom:none}
.t-val{font-family:'IBM Plex Mono',monospace;font-weight:600;}
.grand{background:#1a3a5c;color:#fff;}

.footer{margin-top:20px;font-size:10px;color:#bbb;text-align:right;border-top:1px solid #eee;padding-top:6px;}
</style>
</head>
<body>
<h1>見 積 書</h1>
<div class="meta">
  <div>
    <div class="site-num">No. ${est.siteId||'------'}</div>
    <div class="site-name">${est.name||''}</div>
    <span class="ver-badge">${ver.verLabel}</span>
  </div>
  <div class="meta-right">
    <div class="company">${est.company||'NK'}</div>
    <div class="issue">発行日：${issueDate}</div>
  </div>
</div>
<table>
  <tr>
    <th style="width:36px">No.</th>
    <th style="text-align:left">項目名</th>
    <th style="width:60px;text-align:right">数量</th>
    <th style="width:50px">単位</th>

  win.document.close();
}

/* ══════════════════════════════════════
   VIEW SWITCHER
══════════════════════════════════════ */
function showView(v, evt) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (evt&&evt.target) evt.target.classList.add('active');
  if (v === 'db') renderDbView();
  else {
    if (currentId) renderForm();
    else document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>見積を選択または新規作成</h3><p>左のサイドバーから見積を選ぶか、「新規」ボタンで作成してください。</p></div>`;
  }
}

function renderDbView() {
  if (!estimates.length) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🗄️</div><h3>データがありません</h3><p>見積を保存するとここに一覧表示されます。</p></div>`;
    return;
  }
  const rows = [...estimates].reverse().map(e => {
    const latest = e.versions[e.versions.length-1];
    const { grand } = calcTotals(latest);
    const vc = e.versions.length;
    return `<tr style="cursor:pointer" onclick="openFromDb('${e._id}')">
      <td><span style="font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1a3a5c">${e.siteId||'------'}</span></td>
      <td>${e.name||'—'}</td>
      <td>${e.company||'NK'}</td>
      <td style="text-align:center">
        <span style="background:var(--gold-light);color:var(--gold);border:1px solid #d4b87a;border-radius:3px;padding:1px 7px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600">${latest.verLabel}</span>
        ${vc>1?`<span style="margin-left:4px;font-size:11px;color:var(--ink3)">(全${vc}版)</span>`:''}
      </td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1a3a5c">${fmtYen(Math.round(grand))}</td>
      <td style="color:#888;font-size:12px">${new Date(latest.updatedAt).toLocaleDateString('ja-JP')}</td>
    </tr>`;
  }).join('');
  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="form-header">
      <div>
        <div class="form-title">見積データ一覧</div>
        <div style="font-size:13px;margin-top:4px;color:var(--ink2)">${estimates.length} 件の見積データ</div>
      </div>
    </div>
    <div style="padding:24px 28px">
      <table class="items-table" style="width:100%">
        <thead>
          <tr><th>現場No.</th><th>現場名</th><th>会社名</th><th style="text-align:center">最新版</th><th style="text-align:right">合計金額（税込）</th><th>更新日</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="margin-top:12px;font-size:12px;color:var(--ink3)">※ 行をクリックすると見積の編集画面を開きます。</p>
    </div>
  </div>`;
}

function openFromDb(id) {
  currentId = id;
  currentVer = estimates.find(e=>e._id===id).versions.length - 1;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.nav-btn').classList.add('active');
  renderList(); renderForm();
}

/* ══════════════════════════════════════
   MIGRATE OLD DATA (v1 → v2)
══════════════════════════════════════ */
(function migrate() {
  const old = JSON.parse(localStorage.getItem('nk_estimates') || '[]');
  if (!old.length) return;
  const migrated = old.map(e => ({
    _id: uid(),
    siteId: e.id || '',
    name: e.name || '',
    company: e.company || 'NK',
    createdAt: e.createdAt || new Date().toISOString(),
    versions: [{ verLabel:'第1版', items: e.items||[blankItem()], remarks: e.remarks||'', createdAt: e.createdAt||new Date().toISOString(), updatedAt: e.updatedAt||new Date().toISOString() }]
  }));
  const existing = estimates.map(e => e.siteId);
  migrated.forEach(m => { if (!existing.includes(m.siteId)) estimates.push(m); });
  saveAll();
  localStorage.removeItem('nk_estimates');
})();

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
renderList();
</script>
</body>
</html>
